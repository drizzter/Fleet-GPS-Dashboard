<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fleet Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f1f5f9;color:#0f172a}
header{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:white;padding:28px 32px}
h1{margin:0;font-size:26px;font-weight:700;letter-spacing:-0.5px}
header p{margin:6px 0 0;color:#94a3b8;font-size:14px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;padding:24px 32px}
.card{background:white;border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px #0001,0 8px 24px #0000000a;border:1px solid #e2e8f0}
.card .label{font-size:13px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.card b{font-size:32px;display:block;margin-top:4px;font-weight:700}
.main{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;padding:0 32px 32px}
.panel{background:white;border-radius:18px;padding:20px;box-shadow:0 1px 3px #0001,0 8px 24px #0000000a;border:1px solid #e2e8f0}
.panel h2{font-size:16px;font-weight:600;margin-bottom:14px;color:#334155}
#map{height:580px;border-radius:14px;z-index:1}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#475569;font-weight:500}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 1px 3px #0003}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;border-bottom:1px solid #f1f5f9;text-align:left}
th{font-size:11px;text-transform:uppercase;color:#94a3b8;font-weight:600;letter-spacing:0.5px}
tr:hover{background:#f8fafc}
.badge{color:white;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block}
.device-id{font-weight:700;color:#0f172a;font-size:13px}
.device-name{color:#64748b;font-size:12px}
.time-ago{font-weight:500;color:#334155;font-size:13px}
.time-full{color:#94a3b8;font-size:11px}
.battery-bar{width:50px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.battery-fill{height:100%;border-radius:3px}
@media(max-width:960px){.main{grid-template-columns:1fr}#map{height:400px}}
</style>
</head>
<body>
<header>
<h1>&#x1F69A; Fleet GPS Dashboard</h1>
<p>30 GPS tracking devices across Australia &middot; Real-time map &middot; Last updated from CSV snapshot</p>
</header>

<section class="cards" id="summary"></section>

<section class="main">
<div class="panel">
<h2>Device Map</h2>
<div class="legend" id="legend"></div>
<div id="map"></div>
</div>

<div class="panel">
<h2>Device List</h2>
<div style="overflow-x:auto;max-height:580px;overflow-y:auto">
<table>
<thead style="position:sticky;top:0;background:white;z-index:2"><tr><th>Device</th><th>Status</th><th>Battery</th><th>Last Seen</th><th>Location</th></tr></thead>
<tbody id="rows"></tbody>
</table>
</div>
</div>
</section>

<script>
const devices = [{"device_id": "GPS-001", "name": "Fleet Alpha", "status": "idle", "battery_pct": 30, "lat": -33.780734, "lon": 151.51943, "last_seen": "2026-05-27 07:30:00", "location": "Sydney", "seen_ago": "2 hr ago", "color": "#f59e0b"}, {"device_id": "GPS-002", "name": "Fleet Bravo", "status": "active", "battery_pct": 69, "lat": -37.611861, "lon": 144.800251, "last_seen": "2026-05-27 10:16:00", "location": "Melbourne", "seen_ago": "4 min ago", "color": "#16a34a"}, {"device_id": "GPS-003", "name": "Fleet Charlie", "status": "active", "battery_pct": 65, "lat": -27.012787, "lon": 152.866595, "last_seen": "2026-05-27 10:05:00", "location": "Brisbane", "seen_ago": "15 min ago", "color": "#16a34a"}, {"device_id": "GPS-004", "name": "Fleet Delta", "status": "offline", "battery_pct": 38, "lat": -32.353284, "lon": 116.207494, "last_seen": "2026-05-24 10:30:00", "location": "Perth", "seen_ago": "2 days ago", "color": "#64748b"}, {"device_id": "GPS-005", "name": "Fleet Echo", "status": "idle", "battery_pct": 64, "lat": -34.622872, "lon": 138.829732, "last_seen": "2026-05-27 08:30:00", "location": "Adelaide", "seen_ago": "1 hr ago", "color": "#f59e0b"}, {"device_id": "GPS-006", "name": "Truck North", "status": "active", "battery_pct": 95, "lat": -27.546884, "lon": 153.278534, "last_seen": "2026-05-27 10:11:00", "location": "Gold Coast", "seen_ago": "9 min ago", "color": "#16a34a"}, {"device_id": "GPS-007", "name": "Truck South", "status": "active", "battery_pct": 83, "lat": -32.600595, "lon": 151.89852, "last_seen": "2026-05-27 09:53:00", "location": "Newcastle", "seen_ago": "27 min ago", "color": "#16a34a"}, {"device_id": "GPS-008", "name": "Truck East", "status": "active", "battery_pct": 74, "lat": -35.587711, "lon": 148.699555, "last_seen": "2026-05-27 10:11:00", "location": "Canberra", "seen_ago": "9 min ago", "color": "#16a34a"}, {"device_id": "GPS-009", "name": "Truck West", "status": "active", "battery_pct": 66, "lat": -33.934778, "lon": 151.245318, "last_seen": "2026-05-27 10:05:00", "location": "Wollongong", "seen_ago": "15 min ago", "color": "#16a34a"}, {"device_id": "GPS-010", "name": "Truck Central", "status": "active", "battery_pct": 83, "lat": -43.102026, "lon": 147.465684, "last_seen": "2026-05-27 10:19:00", "location": "Hobart", "seen_ago": "1 min ago", "color": "#16a34a"}, {"device_id": "GPS-011", "name": "Van Metro 1", "status": "active", "battery_pct": 77, "lat": -38.279819, "lon": 144.069507, "last_seen": "2026-05-27 09:45:00", "location": "Geelong", "seen_ago": "35 min ago", "color": "#16a34a"}, {"device_id": "GPS-012", "name": "Van Metro 2", "status": "offline", "battery_pct": 38, "lat": -18.823345, "lon": 146.948035, "last_seen": "2026-05-25 10:30:00", "location": "Townsville", "seen_ago": "1 days ago", "color": "#64748b"}, {"device_id": "GPS-013", "name": "Van Metro 3", "status": "low_battery", "battery_pct": 12, "lat": -16.88586, "lon": 145.514811, "last_seen": "2026-05-27 09:32:00", "location": "Cairns", "seen_ago": "48 min ago", "color": "#dc2626"}, {"device_id": "GPS-014", "name": "Van Regional 1", "status": "idle", "battery_pct": 74, "lat": -12.690052, "lon": 131.265391, "last_seen": "2026-05-27 06:30:00", "location": "Darwin", "seen_ago": "3 hr ago", "color": "#f59e0b"}, {"device_id": "GPS-015", "name": "Van Regional 2", "status": "active", "battery_pct": 63, "lat": -27.375386, "lon": 152.292852, "last_seen": "2026-05-27 10:15:00", "location": "Toowoomba", "seen_ago": "5 min ago", "color": "#16a34a"}, {"device_id": "GPS-016", "name": "Unit Hawk", "status": "offline", "battery_pct": 25, "lat": -37.238197, "lon": 144.155046, "last_seen": "2026-05-24 10:30:00", "location": "Ballarat", "seen_ago": "2 days ago", "color": "#64748b"}, {"device_id": "GPS-017", "name": "Unit Eagle", "status": "active", "battery_pct": 96, "lat": -37.193811, "lon": 144.693136, "last_seen": "2026-05-27 10:09:00", "location": "Bendigo", "seen_ago": "11 min ago", "color": "#16a34a"}, {"device_id": "GPS-018", "name": "Unit Falcon", "status": "active", "battery_pct": 89, "lat": -41.717373, "lon": 147.139231, "last_seen": "2026-05-27 10:20:00", "location": "Launceston", "seen_ago": "0 min ago", "color": "#16a34a"}, {"device_id": "GPS-019", "name": "Unit Osprey", "status": "idle", "battery_pct": 65, "lat": -21.40512, "lon": 148.936628, "last_seen": "2026-05-27 05:30:00", "location": "Mackay", "seen_ago": "4 hr ago", "color": "#f59e0b"}, {"device_id": "GPS-020", "name": "Unit Raven", "status": "active", "battery_pct": 97, "lat": -23.132986, "lon": 150.438434, "last_seen": "2026-05-27 10:04:00", "location": "Rockhampton", "seen_ago": "16 min ago", "color": "#16a34a"}, {"device_id": "GPS-021", "name": "Scout Alpha", "status": "active", "battery_pct": 68, "lat": -25.008004, "lon": 152.847326, "last_seen": "2026-05-27 09:57:00", "location": "Bundaberg", "seen_ago": "23 min ago", "color": "#16a34a"}, {"device_id": "GPS-022", "name": "Scout Bravo", "status": "low_battery", "battery_pct": 6, "lat": -25.296484, "lon": 153.105782, "last_seen": "2026-05-27 10:01:00", "location": "Hervey Bay", "seen_ago": "19 min ago", "color": "#dc2626"}, {"device_id": "GPS-023", "name": "Scout Charlie", "status": "active", "battery_pct": 87, "lat": -34.992554, "lon": 147.662079, "last_seen": "2026-05-27 09:51:00", "location": "Wagga Wagga", "seen_ago": "29 min ago", "color": "#16a34a"}, {"device_id": "GPS-024", "name": "Scout Delta", "status": "offline", "battery_pct": 29, "lat": -36.506472, "lon": 146.801619, "last_seen": "2026-05-22 10:30:00", "location": "Albury", "seen_ago": "4 days ago", "color": "#64748b"}, {"device_id": "GPS-025", "name": "Scout Echo", "status": "active", "battery_pct": 60, "lat": -31.678586, "lon": 152.963226, "last_seen": "2026-05-27 09:46:00", "location": "Port Macquarie", "seen_ago": "34 min ago", "color": "#16a34a"}, {"device_id": "GPS-026", "name": "Patrol 01", "status": "active", "battery_pct": 94, "lat": -30.859278, "lon": 151.10171, "last_seen": "2026-05-27 10:12:00", "location": "Tamworth", "seen_ago": "8 min ago", "color": "#16a34a"}, {"device_id": "GPS-027", "name": "Patrol 02", "status": "idle", "battery_pct": 48, "lat": -33.011401, "lon": 148.940175, "last_seen": "2026-05-27 03:30:00", "location": "Orange", "seen_ago": "6 hr ago", "color": "#f59e0b"}, {"device_id": "GPS-028", "name": "Patrol 03", "status": "active", "battery_pct": 76, "lat": -32.591842, "lon": 148.103245, "last_seen": "2026-05-27 09:57:00", "location": "Dubbo", "seen_ago": "23 min ago", "color": "#16a34a"}, {"device_id": "GPS-029", "name": "Patrol 04", "status": "active", "battery_pct": 66, "lat": -28.508038, "lon": 114.607682, "last_seen": "2026-05-27 09:49:00", "location": "Geraldton", "seen_ago": "31 min ago", "color": "#16a34a"}, {"device_id": "GPS-030", "name": "Patrol 05", "status": "idle", "battery_pct": 68, "lat": -30.951555, "lon": 121.608949, "last_seen": "2026-05-27 06:30:00", "location": "Kalgoorlie", "seen_ago": "3 hr ago", "color": "#f59e0b"}];
const summary = {"active": 18, "idle": 6, "offline": 4, "low_battery": 2};
const colors = {"active": "#16a34a", "idle": "#f59e0b", "offline": "#64748b", "low_battery": "#dc2626"};

const labels = {
  active: "Active",
  idle: "Idle",
  offline: "Offline",
  low_battery: "Low Battery"
};

// Summary cards
const summaryEl = document.getElementById("summary");
Object.keys(colors).forEach(s => {
  summaryEl.innerHTML += `<div class="card"><div class="label">${labels[s]}</div><b style="color:${colors[s]}">${summary[s] || 0}</b></div>`;
});

// Legend
const legend = document.getElementById("legend");
Object.keys(colors).forEach(s => {
  legend.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:${colors[s]}"></span>${labels[s]}</span>`;
});

// Leaflet map
const map = L.map("map", {
  zoomControl: true,
  scrollWheelZoom: true
}).setView([-25.5, 134], 4);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: "abcd",
  maxZoom: 19
}).addTo(map);

// Add markers
devices.forEach(d => {
  const marker = L.circleMarker([d.lat, d.lon], {
    radius: 8,
    fillColor: d.color,
    color: "#fff",
    weight: 2.5,
    opacity: 1,
    fillOpacity: 0.9
  }).addTo(map);

  marker.bindPopup(`
    <div style="font-family:Segoe UI,Arial,sans-serif;min-width:180px">
      <div style="font-weight:700;font-size:14px;margin-bottom:4px">${d.device_id} &middot; ${d.name}</div>
      <div style="margin-bottom:3px"><span style="background:${d.color};color:white;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600">${labels[d.status]}</span></div>
      <div style="font-size:12px;color:#64748b;margin-top:6px">
        Battery: <b>${d.battery_pct}%</b><br>
        Last seen: ${d.seen_ago}<br>
        Location: ${d.location}
      </div>
    </div>
  `);

  marker.bindTooltip(`${d.device_id} &middot; ${d.name}`, {
    direction: "top",
    offset: [0, -8]
  });
});

// Fit map to markers
if (devices.length > 0) {
  const bounds = L.latLngBounds(devices.map(d => [d.lat, d.lon]));
  map.fitBounds(bounds, { padding: [40, 40] });
}

// Device table
function batteryColor(pct) {
  if (pct >= 60) return "#16a34a";
  if (pct >= 30) return "#f59e0b";
  return "#dc2626";
}

devices.forEach(d => {
  document.getElementById("rows").innerHTML += `
    <tr>
      <td><span class="device-id">${d.device_id}</span><br><span class="device-name">${d.name}</span></td>
      <td><span class="badge" style="background:${d.color}">${labels[d.status]}</span></td>
      <td><span class="battery-bar"><span class="battery-fill" style="width:${d.battery_pct}%;background:${batteryColor(d.battery_pct)}"></span></span>${d.battery_pct}%</td>
      <td><span class="time-ago">${d.seen_ago}</span><br><span class="time-full">${d.last_seen}</span></td>
      <td>${d.location}</td>
    </tr>`;
});
</script>
</body>
</html>
